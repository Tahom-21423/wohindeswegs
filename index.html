<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobilität</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body, html { margin:0; height:100%; font-family: Roboto, Arial; }

#map { position:absolute; top:0; bottom:0; right:0; left:300px; }

#panel {
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:300px;
  background:#111;
  color:white;
  padding:20px;
}

button {
  display:block;
  width:100%;
  margin:10px 0;
  padding:10px;
  background:#333;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover { background:#555; }

#overlayCO2 {
  position:absolute;
  background:black;
  color:white;
  padding:8px 14px;
  border-radius:20px;
  font-weight:bold;
  display:none;
}

#overlayTime {
  position:absolute;
  color:white;
  font-size:22px;
  font-family: monospace;
  display:none;
}
</style>
</head>

<body>

<div id="panel">
  <h2>Von Winsen nach…</h2>
  <div id="ziele"></div>
  <div id="verkehr"></div>
</div>

<div id="map"></div>
<div id="overlayCO2"></div>
<div id="overlayTime"></div>

<script>

// Karte
var map = L.map('map').setView([53.36, 10.21], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Winsen Marker
var winsen = [53.36, 10.21];
L.marker(winsen).addTo(map);

// Ziele
const orte = {
  "Tespe": [53.40, 10.32],
  "Hamburg Großneumarkt": [53.55, 9.98],
  "Bendestorf": [53.34, 9.97],
  "Gifhorn Mühlenmuseum": [52.48, 10.55],
  "Hannover Flughafen": [52.46, 9.68]
};

// Dummy-Routen (einfach Linien → wirkt aber gut!)
function getRoute(ziel){
  return [winsen, ziel];
}

// CO2 + Zeit Werte
const daten = {
  "Tespe": {
    "Auto": {co2:"2 kg", time:"00:15"},
    "E-Auto": {co2:"1 kg", time:"00:15"},
    "ÖPNV": {co2:"1.5 kg", time:"00:35"},
    "E-Bike": {co2:"0 kg", time:"00:45"}
  },
  "Hamburg Großneumarkt": {
    "Auto": {co2:"8 kg", time:"00:35"},
    "E-Auto": {co2:"4 kg", time:"00:35"},
    "ÖPNV": {co2:"3 kg", time:"00:50"},
    "E-Bike": {co2:"0 kg", time:"01:20"}
  }
};

let aktuelleRoute;
let aktuellesZiel;

// Ziele anzeigen
const zielDiv = document.getElementById("ziele");

for(let ort in orte){
  let btn = document.createElement("button");
  btn.innerText = ort;

  btn.onclick = function(){
    aktuellesZiel = ort;
    zeichneRoute(orte[ort]);
    zeigeVerkehr();
  }

  zielDiv.appendChild(btn);
}

// Route zeichnen (Animation light)
function zeichneRoute(ziel){

  if(aktuelleRoute) map.removeLayer(aktuelleRoute);

  let coords = getRoute(ziel);

  aktuelleRoute = L.polyline(coords, {color:"blue"}).addTo(map);

  map.fitBounds(aktuelleRoute.getBounds());
}

// Verkehrsmittel anzeigen
function zeigeVerkehr(){

  const verkehrDiv = document.getElementById("verkehr");
  verkehrDiv.innerHTML = "";

  ["Auto","E-Auto","ÖPNV","E-Bike"].forEach(v => {
    let btn = document.createElement("button");
    btn.innerText = v;

    btn.onclick = function(){
      zeigeOverlay(v);
    }

    verkehrDiv.appendChild(btn);
  });
}

// Overlay anzeigen
function zeigeOverlay(v){

  let data = daten[aktuellesZiel]?.[v];
  if(!data) return;

  let center = aktuelleRoute.getBounds().getCenter();
  let point = map.latLngToContainerPoint(center);

  let co2 = document.getElementById("overlayCO2");
  let time = document.getElementById("overlayTime");

  co2.style.left = point.x + "px";
  co2.style.top = point.y + "px";
  co2.innerHTML = data.co2;
  co2.style.display = "block";

  time.style.left = (point.x + 80) + "px";
  time.style.top = (point.y - 20) + "px";
  time.innerHTML = data.time;
  time.style.display = "block";
}

</script>

</body>
</html>
