<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Von Winsen nach…</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: Roboto, Arial;
  background: #000;
  overflow: hidden;
}

#app { display:flex; height:100%; }

#panel {
  width: 360px;
  background: #000;
  color: #fff;
  padding: 24px;
}

#title, #subtitle {
  font-size: 28px;
  font-weight: 700;
}

#subtitle { margin-bottom:20px; }

.section-label {
  font-size: 14px;
  text-transform: uppercase;
  margin: 10px 0;
  opacity: 0.7;
}

.panel-btn {
  width: 100%;
  padding: 14px;
  margin: 6px 0;
  background: #333;
  color: #fff;
  border: none;
  font-size: 18px;
}

#mapWrap { flex:1; position:relative; }
#map { height:100%; }

.overlay {
  position:absolute;
  pointer-events:none;
}

/* CO2 Kreis */
#co2Bubble {
  width:120px;
  height:120px;
  background:#1f1f1f;
  border-radius:50%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  font-weight:bold;
}

/* Zeit Anzeige */
#timeDisplay {
  background:#2b2b2b;
  color:#39ff14;
  font-family: monospace;
  font-size:32px;
  padding:8px 12px;
  border-radius:8px;
}

#nextBtn {
  margin-top:20px;
}
</style>
</head>

<body>

<div id="app">

<div id="panel">
  <div id="title">Von Winsen nach…</div>
  <div id="subtitle"></div>

  <div id="destSection">
    <div class="section-label">Ziele</div>
    <div id="destList"></div>
  </div>

  <div id="transportSection" style="display:none;">
    <div class="section-label">Verkehrsmittel</div>
    <div id="transportList"></div>
  </div>

  <button id="nextBtn" style="display:none;">Nächstes Ziel</button>

</div>

<div id="mapWrap">
  <div id="map"></div>
  <div id="co2Bubble" class="overlay"></div>
  <div id="timeDisplay" class="overlay"></div>
</div>

</div>

<script>
const ORS_API_KEY = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImFjZTUyYmU5YWFkZDRlMjI5ZGQyZWJkOTQzZjZlYWZkIiwiaCI6Im11cm11cjY0In0=";

const winsen = [53.3608,10.2125];

const destinations = {
  "Tespe":[53.40,10.32],
  "Hamburg Großneumarkt":[53.55,9.98],
  "Bendestorf":[53.34,9.97],
  "Gifhorn":[52.48,10.55],
  "Hannover Flughafen":[52.46,9.68]
};

const values = {
  "Tespe":{"Auto":["2kg","00:15"],"E-Auto":["1kg","00:15"],"ÖPNV":["1.5kg","00:35"],"E-Bike":["0kg","00:45"]},
  "Hamburg Großneumarkt":{"Auto":["8kg","00:35"],"E-Auto":["4kg","00:35"],"ÖPNV":["3kg","00:50"],"E-Bike":["0kg","01:20"]},
  "Bendestorf":{"Auto":["4kg","00:20"],"E-Auto":["2kg","00:20"],"ÖPNV":["2kg","00:45"],"E-Bike":["0kg","00:55"]},
  "Gifhorn":{"Auto":["15kg","01:20"],"E-Auto":["6kg","01:20"],"ÖPNV":["5kg","02:00"],"E-Bike":["0kg","04:00"]},
  "Hannover Flughafen":{"Auto":["18kg","01:30"],"E-Auto":["7kg","01:30"],"ÖPNV":["6kg","02:10"],"E-Bike":["0kg","05:00"]}
};

let map=L.map('map').setView([53.2,10],9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
L.marker(winsen).addTo(map);

let routeLine=null;
let currentDest=null;

const destList=document.getElementById("destList");
const transportList=document.getElementById("transportList");

for(let d in destinations){
  let b=document.createElement("button");
  b.innerText=d;
  b.className="panel-btn";
  b.onclick=()=>selectDest(d);
  destList.appendChild(b);
}

function selectDest(d){
  currentDest=d;
  document.getElementById("subtitle").innerText=d;
  document.getElementById("destSection").style.display="none";
  document.getElementById("transportSection").style.display="block";
  document.getElementById("nextBtn").style.display="block";
}

["Auto","E-Auto","ÖPNV","E-Bike"].forEach(v=>{
  let b=document.createElement("button");
  b.innerText=v;
  b.className="panel-btn";
  b.onclick=()=>loadRoute(v);
  transportList.appendChild(b);
});

async function loadRoute(v){
  let profile=(v==="E-Bike")?"cycling-regular":"driving-car";
  let dest=destinations[currentDest];

  let res=await fetch("https://api.openrouteservice.org/v2/directions/"+profile+"/geojson",{
    method:"POST",
    headers:{
      "Authorization":ORS_API_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      coordinates:[[winsen[1],winsen[0]],[dest[1],dest[0]]]
    })
  });

  let data=await res.json();

  if(routeLine) map.removeLayer(routeLine);

  routeLine=L.geoJSON(data).addTo(map);
  map.fitBounds(routeLine.getBounds());

  showOverlay(v);
}

function showOverlay(v){
  let val=values[currentDest][v];

  let center=routeLine.getBounds().getCenter();
  let p=map.latLngToContainerPoint(center);

  let co2=document.getElementById("co2Bubble");
  co2.innerHTML=val[0]+"<br>CO₂";
  co2.style.left=(p.x-60)+"px";
  co2.style.top=(p.y+10)+"px";

  let time=document.getElementById("timeDisplay");
  time.innerText=val[1];
  time.style.left=(p.x+70)+"px";
  time.style.top=(p.y-30)+"px";
}

document.getElementById("nextBtn").onclick=()=>{
  location.reload();
};
</script>

</body>
</html>
